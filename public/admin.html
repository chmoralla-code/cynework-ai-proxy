<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cyAIrhiel Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Instrument+Serif&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main" style="max-width:1200px;">
        <header class="main-header">
            <h1 class="brand" style="font-size:38px;margin:0;">Admin Dashboard</h1>
            <div class="auth-btn-row">
                <a href="index.html" class="ghost-btn">Back to Chat</a>
                <button id="adminLogoutBtn" class="ghost-btn">Logout</button>
            </div>
        </header>

        <section class="pricing-panel" id="adminLoginPanel">
            <h2>Admin Login</h2>
            <form id="adminLoginForm" class="auth-form" style="max-width:360px;">
                <input type="text" id="adminUsername" placeholder="Username" required>
                <input type="password" id="adminPassword" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>
        </section>

        <section class="pricing-panel" id="adminDataPanel" style="display:none;">
            <h2>Registered Clients</h2>
            <table id="clientsTable"></table>
        </section>

        <section class="pricing-panel" id="subscriptionPanel" style="display:none;">
            <h2>Subscription Requests</h2>
            <table id="requestsTable"></table>
        </section>
    </div>
    <script src="admin.js"></script>
</body>
</html>
